<!DOCTYPE html>
<html lang="ka">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="profile.css">
	<title>Traveler - ჩემი პროფილი</title>
</head>
<body>
	<header class="brandheader">
		<h1>World Traveler</h1>
		<p>Best travel company in the world</p>
	</header>

	<div class="profile-card">
		<div class="profile-info">
			<div class="avatar-wrapper">
				<img src="https://via.placeholder.com/120" id="profile-img-preview" alt=პროფილი>
			</div>
			<div class="user-details">
				<h2 id="display-name">
					სტუმარი
				</h2>
				<p id="display-bio">
					თქვენი მოგზაურობის ისტორია...
					
				</p>
				
			</div>
			<hr>
			<div class="edit-section">
				<h3>
					პროფილის მართვა
				</h3>
				<div class="input-group">
					<label>
						სახელი
					</label>
					<input type="text" id="name-input" placeholder="შეიყვანეთ სახელი">
				</div>
				<div class="input-group">
					<label>
						თქვენს შესახებ
					</label>
					<textarea id="bio-input" placeholder="აღწერეთ თქვენი თავგადასავლები"></textarea>
				</div>
				<div class="input-group">
					<label>
						პროფილის სურათი
					</label>
					<input type="file" id="file-input" accept="image/*">
				</div>
				<button id="save-btn">
					მონაცემების შენახვა
				</button>
			</div>	
		</div>


		<div class="navigation-actions" >
			<button onclick="window.location.href='logged.html'" class="home-btn" >მთავარი გვერდი</button>
		</div>

		<script src="script.js"></script>
			


</body>
</html>
